name: Documentation

on:
  push:
    tags:
      - 'v*'
  # Allows to run the workflow manually
  workflow_dispatch:

permissions:
  contents: read

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  CUSTOM_DOMAIN: python-sdk.meilisearch.com

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: 1
      PYTHON_VERSION: "3.10"
      UV_LOCKED: 1
    steps:
      - name: Checkout the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          lfs: true
          persist-credentials: false

      - name: Setup Github Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      - name: Install Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: "0.11.21"
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: false

      - name: Build docs
        run: |
          uv run --only-group docs sphinx-apidoc -f -o docs meilisearch/
          uv run --only-group docs sphinx-build docs ./docs/_build/html/

      # CNAME file is required for GitHub pages custom domain
      - name: Create CNAME file
        run: |
          echo "$CUSTOM_DOMAIN" > ./docs/_build/html/CNAME
          echo "Created CNAME in ./docs/_build/html/: $CUSTOM_DOMAIN"

      - name: Upload artifacts
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: "./docs/_build/html"

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
