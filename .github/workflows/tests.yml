name: Tests

on:
  pull_request:
  push:
    branches:
      - main
  merge_group:

jobs:
  integration_tests:
    # Will not run if the event is a PR to bump-meilisearch-v* (so a pre-release PR)
    # Will still run for each push to bump-meilisearch-v*
    if: github.event_name != 'pull_request' || !startsWith(github.base_ref, 'bump-meilisearch-v')
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    name: integration-tests
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: 1
      UV_PYTHON: ${{ matrix.python-version }}
      UV_LOCKED: 1
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.11.16"

      - name: Meilisearch (latest version) setup with Docker
        run: docker run -d -p 7700:7700 getmeili/meilisearch-enterprise:latest meilisearch --no-analytics --master-key=masterKey

      - name: Test with pytest
        run: uv run pytest --cov-report=xml

  pylint:
    name: pylint
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: 1
      UV_PYTHON: "3.9"
      UV_LOCKED: 1
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.11.16"

      - name: Linter with pylint
        run: uv run pylint meilisearch tests

  mypy:
    name: mypy
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: 1
      UV_PYTHON: "3.9"
      UV_LOCKED: 1
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.11.16"

      - name: mypy type check
        run: uv run mypy meilisearch

  black:
    name: black
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: 1
      UV_PYTHON: "3.9"
      UV_LOCKED: 1
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.11.16"

      - name: black
        run: uv run black meilisearch tests --check

  isort:
    name: isort
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: 1
      UV_PYTHON: "3.9"
      UV_LOCKED: 1
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: 3.9

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "0.11.16"

      - name: isort
        run: uv run isort meilisearch tests --check-only

  yaml-lint:
    name: Yaml linting check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Yaml lint check
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint.yml
